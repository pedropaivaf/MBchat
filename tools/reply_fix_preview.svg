<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="640" viewBox="0 0 1000 640" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1000" height="640" fill="#eef2f7"/>
  <text x="500" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#0f2a5c">Responder uma mensagem que já é resposta — antes × depois</text>
  <text x="500" y="62" text-anchor="middle" font-size="13" fill="#5b6b85">Chat estilo WhatsApp do MB Chat · clique direito sobre o balão de resposta (na citação)</text>

  <!-- ================= ANTES ================= -->
  <g>
    <rect x="30" y="86" width="450" height="520" rx="14" fill="#ffffff" stroke="#d7e0ec" filter="url(#sh)"/>
    <rect x="30" y="86" width="450" height="44" rx="14" fill="#0f2a5c"/>
    <rect x="30" y="112" width="450" height="18" fill="#0f2a5c"/>
    <text x="55" y="114" font-size="15" font-weight="600" fill="#fff">Maria — conversa</text>
    <text x="250" y="156" text-anchor="middle" font-size="13" font-weight="700" fill="#b4261f">ANTES — "Responder" não aparece</text>

    <!-- peer bubble -->
    <g>
      <rect x="55" y="176" width="250" height="52" rx="12" fill="#eef1f5" stroke="#e2e8f0"/>
      <text x="70" y="196" font-size="12" font-weight="700" fill="#2451a0">Maria  14:58</text>
      <text x="70" y="216" font-size="13" fill="#1a202c">Reunião às 15h, pode ser?</text>
    </g>

    <!-- my reply bubble -->
    <g>
      <!-- hit area (only body) -->
      <rect x="205" y="290" width="220" height="34" rx="6" fill="none" stroke="#b4261f" stroke-width="2" stroke-dasharray="5 4"/>
      <text x="315" y="338" text-anchor="middle" font-size="10.5" fill="#b4261f">área clicável = só o corpo</text>

      <rect x="205" y="244" width="220" height="80" rx="12" fill="#dce9ff" stroke="#bcd3f5"/>
      <!-- quote header -->
      <rect x="216" y="252" width="198" height="34" rx="5" fill="#c9ddff"/>
      <rect x="216" y="252" width="4" height="34" fill="#2451a0"/>
      <text x="228" y="266" font-size="11" font-weight="700" fill="#2451a0">Maria</text>
      <text x="228" y="281" font-size="11" fill="#3a4a63">Reunião às 15h, pode ser?</text>
      <!-- body -->
      <text x="228" y="307" font-size="11.5" font-weight="700" fill="#173a73">Você  15:01 ·</text>
      <text x="228" y="320" font-size="13" fill="#10243f">Pode ser, confirmo já</text>
    </g>

    <!-- right click on the quote -->
    <circle cx="300" cy="268" r="7" fill="none" stroke="#b4261f" stroke-width="2"/>
    <text x="312" y="262" font-size="11" fill="#b4261f">clique direito aqui ↑ (na citação)</text>

    <!-- context menu WITHOUT Responder -->
    <g filter="url(#sh)">
      <rect x="300" y="346" width="150" height="78" rx="8" fill="#ffffff" stroke="#dbe3ef"/>
      <text x="318" y="372" font-size="13" fill="#cbd2dd">⮪  Responder</text>
      <line x1="312" y1="372" x2="392" y2="372" stroke="#cbd2dd" stroke-width="1.2"/>
      <text x="318" y="397" font-size="13" fill="#1a202c">⧉  Copiar</text>
      <text x="318" y="416" font-size="13" fill="#1a202c">☑  Selecionar</text>
    </g>
    <text x="250" y="470" text-anchor="middle" font-size="11.5" fill="#b4261f">A citação fica FORA da área clicável →</text>
    <text x="250" y="488" text-anchor="middle" font-size="11.5" fill="#b4261f">o clique cai na mensagem anterior → "Responder" some.</text>
  </g>

  <!-- ================= DEPOIS ================= -->
  <g>
    <rect x="520" y="86" width="450" height="520" rx="14" fill="#ffffff" stroke="#d7e0ec" filter="url(#sh)"/>
    <rect x="520" y="86" width="450" height="44" rx="14" fill="#0f2a5c"/>
    <rect x="520" y="112" width="450" height="18" fill="#0f2a5c"/>
    <text x="545" y="114" font-size="15" font-weight="600" fill="#fff">Maria — conversa</text>
    <text x="740" y="156" text-anchor="middle" font-size="13" font-weight="700" fill="#1b8a3a">DEPOIS — "Responder" disponível</text>

    <!-- peer bubble -->
    <g>
      <rect x="545" y="176" width="250" height="52" rx="12" fill="#eef1f5" stroke="#e2e8f0"/>
      <text x="560" y="196" font-size="12" font-weight="700" fill="#2451a0">Maria  14:58</text>
      <text x="560" y="216" font-size="13" fill="#1a202c">Reunião às 15h, pode ser?</text>
    </g>

    <!-- my reply bubble -->
    <g>
      <!-- hit area (whole bubble incl quote) -->
      <rect x="691" y="240" width="228" height="88" rx="12" fill="none" stroke="#1b8a3a" stroke-width="2" stroke-dasharray="5 4"/>
      <text x="805" y="344" text-anchor="middle" font-size="10.5" fill="#1b8a3a">área clicável = balão inteiro (citação + corpo)</text>

      <rect x="695" y="244" width="220" height="80" rx="12" fill="#dce9ff" stroke="#bcd3f5"/>
      <rect x="706" y="252" width="198" height="34" rx="5" fill="#c9ddff"/>
      <rect x="706" y="252" width="4" height="34" fill="#2451a0"/>
      <text x="718" y="266" font-size="11" font-weight="700" fill="#2451a0">Maria</text>
      <text x="718" y="281" font-size="11" fill="#3a4a63">Reunião às 15h, pode ser?</text>
      <text x="718" y="307" font-size="11.5" font-weight="700" fill="#173a73">Você  15:01 ·</text>
      <text x="718" y="320" font-size="13" fill="#10243f">Pode ser, confirmo já</text>
    </g>

    <circle cx="790" cy="268" r="7" fill="none" stroke="#1b8a3a" stroke-width="2"/>
    <text x="600" y="262" font-size="11" fill="#1b8a3a">clique direito na citação ↑ agora funciona</text>

    <!-- context menu WITH Responder -->
    <g filter="url(#sh)">
      <rect x="790" y="346" width="150" height="78" rx="8" fill="#ffffff" stroke="#dbe3ef"/>
      <rect x="794" y="350" width="142" height="22" rx="5" fill="#e8f0fe"/>
      <text x="808" y="372" font-size="13" font-weight="700" fill="#0f2a5c">⮪  Responder</text>
      <line x1="802" y1="376" x2="882" y2="376" stroke="#e2e8f0" stroke-width="1.2"/>
      <text x="808" y="398" font-size="13" fill="#1a202c">⧉  Copiar</text>
      <text x="808" y="417" font-size="13" fill="#1a202c">☑  Selecionar</text>
    </g>
    <text x="740" y="470" text-anchor="middle" font-size="11.5" fill="#1b8a3a">O hit-test passou a incluir a citação (topo do balão).</text>
    <text x="740" y="488" text-anchor="middle" font-size="11.5" fill="#1b8a3a">Clicar em qualquer ponto do balão resolve nessa mensagem.</text>
  </g>

  <!-- footer note -->
  <rect x="30" y="520" width="450" height="74" rx="10" fill="#fbf4f4" stroke="#f0d9d9"/>
  <text x="48" y="544" font-size="12" font-weight="700" fill="#b4261f">Causa</text>
  <text x="48" y="563" font-size="11.5" fill="#5b3a3a">Citação inserida antes de header_start; hit-test (_msg_ranges_idx)</text>
  <text x="48" y="579" font-size="11.5" fill="#5b3a3a">cobria só o corpo → clique na citação resolvia na msg anterior/-1.</text>

  <rect x="520" y="520" width="450" height="74" rx="10" fill="#f3faf5" stroke="#cfecd8"/>
  <text x="538" y="544" font-size="12" font-weight="700" fill="#1b8a3a">Correção</text>
  <text x="538" y="563" font-size="11.5" fill="#2f5a3d">Novo bubble_start (topo do balão) + lista _msg_hit_idx usada pelo</text>
  <text x="538" y="579" font-size="11.5" fill="#2f5a3d">hit-test. Vale p/ chat individual e grupo. Própria msg ou de terceiros.</text>
</svg>
